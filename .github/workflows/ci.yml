name: 🤖 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-unit:
    name: CLI:Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/cli...

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      - name: Run CLI unit tests
        working-directory: cli
        run: pnpm test

  cli-e2e:
    name: CLI:E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/cli... --filter @loopress/wordpress-plugin... --filter .

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      # `loopress/setup-ci` installs the last *published* release of the plugin, since it's
      # also used to smoke-test real releases. That means these e2e tests would otherwise
      # exercise stale, already-released plugin code instead of this branch's changes, so
      # any fix landing here and there at the same time couldn't be verified by its own PR.
      - name: Build this branch's wordpress-plugin as an installable zip
        working-directory: wordpress-plugin
        run: pnpm run pack

      - name: Start WordPress
        uses: loopress/setup-ci@fabf44d597116f76abdbdb157bbd4de8d1e0a1c3 # main

      - name: Install this branch's wordpress-plugin build over the released one
        run: |
          CONTAINER=$(docker ps --filter "ancestor=wordpress:latest" --format "{{.ID}}" | head -n1)
          if [ -z "$CONTAINER" ]; then
            echo "::error::Could not find the WordPress container started by loopress/setup-ci"
            exit 1
          fi
          docker cp wordpress-plugin/loopress.zip "$CONTAINER":/tmp/loopress.zip
          docker exec "$CONTAINER" wp plugin install /tmp/loopress.zip --force --activate --allow-root

      - name: Extract app password
        id: wp-creds
        run: |
          TOKEN=$(jq -r '.projects[.currentProject.id].environments[.currentProject.env].token' ~/.loopress/config.json)
          echo "app-password=${TOKEN#*:}" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run CLI e2e tests
        env:
          WP_URL: http://localhost:8080
          WP_USERNAME: admin
          # Matches the account password `loopress/setup-ci` hardcodes when it runs
          # `wp core install --admin_password="admin"` — needed for wp-admin UI login,
          # distinct from the REST API application password above.
          WP_ADMIN_PASSWORD: admin
          WP_APP_PASSWORD: ${{ steps.wp-creds.outputs.app-password }}
        run: pnpm test:e2e

  plugin-php:
    name: Plugin:PHPStan + PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan analysis
        run: composer run analyse

      - name: Run psalm
        run: composer run psalm

      - name: PHP CodeSniffer
        run: composer run cs

      - name: PHPUnit tests
        run: composer run test

  plugin-frontend:
    name: Plugin:Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/wordpress-plugin...

      - name: Run tests
        working-directory: wordpress-plugin
        run: pnpm test

      - name: Run build
        working-directory: wordpress-plugin
        run: pnpm build
