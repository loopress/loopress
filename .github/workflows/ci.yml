name: 🤖 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# None of these jobs need to write to the repo or any GitHub API beyond reading it;
# the default GITHUB_TOKEN permissions are broader than that.
permissions:
  contents: read

jobs:
  cli-unit:
    name: CLI:Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # None of these jobs push or commit back to the repo, so the checked-out
          # GITHUB_TOKEN doesn't need to stick around in git config for later steps
          # (e.g. `pnpm install` running third-party postinstall scripts) to read.
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/cli...

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      - name: Run CLI unit tests
        working-directory: cli
        run: pnpm test

  cli-e2e:
    name: CLI:E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # None of these jobs push or commit back to the repo, so the checked-out
          # GITHUB_TOKEN doesn't need to stick around in git config for later steps
          # (e.g. `pnpm install` running third-party postinstall scripts) to read.
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/cli... --filter @loopress/wordpress-plugin... --filter .

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      # `loopress/setup-ci` installs the last *published* release of the plugin, since it's
      # also used to smoke-test real releases. That means these e2e tests would otherwise
      # exercise stale, already-released plugin code instead of this branch's changes, so
      # any fix landing here and there at the same time couldn't be verified by its own PR.
      # Loopress Full is installed, as a superset of Loopress Light: it covers both the
      # snippet-sync and composer-sync specs without a second WordPress instance.
      - name: Build this branch's plugin as installable zips (both editions)
        working-directory: wordpress-plugin
        run: pnpm run pack

      - name: Start WordPress
        uses: loopress/setup-ci@cbc20a05bcb97601e7ba15833ebbc51d7408fb18 # main

      - name: Install this branch's Loopress Full build over the released one
        run: |
          CONTAINER=$(docker ps --filter "ancestor=wordpress:latest" --format "{{.ID}}" | head -n1)
          if [ -z "$CONTAINER" ]; then
            echo "::error::Could not find the WordPress container started by loopress/setup-ci"
            exit 1
          fi
          # `wp plugin install --force` only replaces a plugin already installed under the
          # SAME folder/slug as the zip being installed. `loopress/setup-ci` pre-installs the
          # last *published* release, which may still be under the pre-rename "loopress" slug
          # (this build's zip now unpacks to "loopress-full"), so `--force` alone would silently
          # leave that stale build active side by side with this one instead of replacing it,
          # and this repo's own coexistence guard would then make the stale build win. Clearing
          # every slug this plugin has ever shipped under first makes the install deterministic
          # regardless of which one the baseline happens to be on.
          docker exec "$CONTAINER" wp plugin deactivate loopress loopress-full loopress-light --allow-root || true
          docker exec "$CONTAINER" wp plugin delete loopress loopress-full loopress-light --allow-root || true
          docker cp wordpress-plugin/loopress-full.zip "$CONTAINER":/tmp/loopress-full.zip
          docker exec "$CONTAINER" wp plugin install /tmp/loopress-full.zip --activate --allow-root

      - name: Extract app password
        id: wp-creds
        run: |
          TOKEN=$(jq -r '.projects[.currentProject.id].environments[.currentProject.env].token' "${XDG_CONFIG_HOME:-$HOME/.config}/loopress/config.json")
          echo "app-password=${TOKEN#*:}" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run CLI e2e tests
        env:
          WP_URL: http://localhost:8080
          WP_USERNAME: admin
          # Matches the account password `loopress/setup-ci` hardcodes when it runs
          # `wp core install --admin_password="admin"` — needed for wp-admin UI login,
          # distinct from the REST API application password above.
          WP_ADMIN_PASSWORD: admin
          WP_APP_PASSWORD: ${{ steps.wp-creds.outputs.app-password }}
        run: pnpm test:e2e

  plugin-php:
    name: Plugin:PHPStan + PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress-plugin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # None of these jobs push or commit back to the repo, so the checked-out
          # GITHUB_TOKEN doesn't need to stick around in git config for later steps
          # (e.g. `pnpm install` running third-party postinstall scripts) to read.
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan analysis
        run: composer run analyse

      - name: Run psalm
        run: composer run psalm

      - name: PHP CodeSniffer
        run: composer run cs

      - name: PHPUnit tests
        run: composer run test

  plugin-frontend:
    name: Plugin:Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # None of these jobs push or commit back to the repo, so the checked-out
          # GITHUB_TOKEN doesn't need to stick around in git config for later steps
          # (e.g. `pnpm install` running third-party postinstall scripts) to read.
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/wordpress-plugin...

      - name: Run tests
        working-directory: wordpress-plugin
        run: pnpm test

      - name: Run build
        working-directory: wordpress-plugin
        run: pnpm build

  plugin-light-artifact-guard:
    name: Plugin:Loopress Light artifact contains no Composer code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/wordpress-plugin...

      - name: Build the Loopress Light edition zip
        working-directory: wordpress-plugin
        run: pnpm run pack:light

      # wordpress.org guidelines forbid a plugin from shipping Composer/Packagist
      # installer code even inactive (see obsidian/Product/WordPress.org Plugin
      # Distribution.md §2-3). This asserts the Loopress Light artifact never regresses
      # that, rather than trusting the build script's stripping logic to always be correct.
      - name: Assert the Loopress Light zip contains no Composer/Packagist code
        working-directory: wordpress-plugin
        run: |
          rm -rf /tmp/loopress-light-check
          mkdir /tmp/loopress-light-check
          unzip -q loopress-light.zip -d /tmp/loopress-light-check
          if find /tmp/loopress-light-check/loopress-light/src -type d -name Dependencies | grep -q .; then
            echo "::error::Loopress Light artifact contains src/Dependencies"
            exit 1
          fi
          if [ -f /tmp/loopress-light-check/loopress-light/uninstall.php ]; then
            echo "::error::Loopress Light artifact contains uninstall.php"
            exit 1
          fi
          if grep -RiIl --include='*.php' -E 'composer|packagist' /tmp/loopress-light-check/loopress-light/src /tmp/loopress-light-check/loopress-light/loopress.php; then
            echo "::error::Loopress Light artifact PHP source references Composer/Packagist"
            exit 1
          fi
          # if grep -il -E 'packagist|dependency management' /tmp/loopress-light-check/loopress-light/build/index.tsx.js; then
          #   echo "::error::Loopress Light artifact JS bundle references Composer/Packagist"
          #   exit 1
          # fi
