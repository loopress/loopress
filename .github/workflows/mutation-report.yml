name: 🧬 Mutation reports

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  cli-mutation:
    name: CLI mutation report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/cli...

      - name: Run mutation tests
        working-directory: cli
        run: pnpm test:mutation

      - name: Upload mutation report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-mutation-report
          path: cli/reports/mutation

  plugin-mutation:
    name: Plugin mutation report (Infection)
    runs-on: ubuntu-latest
    # Report-only for now, not a merge gate (see wordpress-plugin/infection.json5).
    continue-on-error: true
    defaults:
      run:
        working-directory: wordpress-plugin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          coverage: pcov

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run mutation testing
        run: composer run mutation

      - name: Upload mutation report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plugin-mutation-report
          path: |
            wordpress-plugin/infection.html
            wordpress-plugin/infection-summary.log

  deploy:
    name: Publish reports to GitHub Pages
    needs: [cli-mutation, plugin-mutation]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download CLI mutation report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-mutation-report
          path: site

      - name: Download plugin mutation report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: plugin-mutation-report
          path: site/plugin

      # CLI report is served at the site root, plugin report is nested under /plugin/,
      # since GitHub Pages deploys a single artifact and both reports share this site.
      - name: Arrange Pages content
        run: |
          mv site/mutation.html site/index.html
          mv site/plugin/infection.html site/plugin/index.html

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
