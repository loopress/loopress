name: 🦋 Release preview

on:
  pull_request_target:

permissions: {}

jobs:
  pr-status:
    name: Changeset status
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      comment-body: ${{ steps.pr-status.outputs.comment-body }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - id: pr-status
        uses: changesets/action/pr-status@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: pr-status
    permissions:
      pull-requests: write
    steps:
      - uses: changesets/action/pr-comment@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          body: ${{ needs.pr-status.outputs.comment-body }}

  cli-docs:
    name: Sync CLI manifest and README
    runs-on: ubuntu-latest
    # Only run on the "Version Packages" PR that changesets/action (release.yml) opens
    # from changeset-release/main: that's the PR that bumps cli/package.json's version,
    # so it's the one point where the manifest/README can actually drift from the code.
    # The branch check also keeps this off forks: `pull_request_target` runs with a
    # write-scoped token, and changeset-release/main only ever exists on this repo.
    if: github.event.pull_request.head.ref == 'changeset-release/main' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Detect CLI changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            cli:
              - 'cli/**'

      - name: Checkout PR branch
        if: steps.filter.outputs.cli == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        if: steps.filter.outputs.cli == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        if: steps.filter.outputs.cli == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.filter.outputs.cli == 'true'
        run: pnpm install --frozen-lockfile --filter @loopress/cli...

      - name: Build CLI
        if: steps.filter.outputs.cli == 'true'
        working-directory: cli
        run: pnpm build

      - name: Regenerate manifest and README
        if: steps.filter.outputs.cli == 'true'
        working-directory: cli
        run: pnpm run version

      - name: Commit regenerated docs
        if: steps.filter.outputs.cli == 'true'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- cli/README.md cli/oclif.manifest.json; then
            echo "CLI docs already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/README.md cli/oclif.manifest.json
          git commit -m "docs(cli): regenerate manifest and README"
          git push origin HEAD:"$HEAD_REF"

  wordpress-plugin-version:
    name: Sync WordPress plugin version header
    runs-on: ubuntu-latest
    # Same rationale as cli-docs above: `changeset version` bumps wordpress-plugin/package.json
    # directly and never runs its npm "version" lifecycle script, so loopress.php's `Version:`
    # header and both readme.txt's `Stable tag:` would otherwise stay stuck at the previous
    # release forever. This reacts to the Version Packages PR the same way cli-docs does.
    if: github.event.pull_request.head.ref == 'changeset-release/main' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Detect wordpress-plugin version bump
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            plugin:
              - 'wordpress-plugin/package.json'

      - name: Checkout PR branch
        if: steps.filter.outputs.plugin == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        if: steps.filter.outputs.plugin == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        if: steps.filter.outputs.plugin == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Sync version header
        if: steps.filter.outputs.plugin == 'true'
        working-directory: wordpress-plugin
        run: pnpm run version

      - name: Commit synced version
        if: steps.filter.outputs.plugin == 'true'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Diff against HEAD, not the index: the version script already ran `git add`,
          # so its changes are staged and a plain `git diff --quiet` would miss them.
          if git diff --quiet HEAD -- wordpress-plugin/loopress.php wordpress-plugin/readme.txt wordpress-plugin/flavors/plus/readme.txt; then
            echo "Plugin version header already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wordpress-plugin/loopress.php wordpress-plugin/readme.txt wordpress-plugin/flavors/plus/readme.txt
          git commit -m "docs(wordpress-plugin): sync version header"
          git push origin HEAD:"$HEAD_REF"
