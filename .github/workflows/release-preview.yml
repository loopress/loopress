name: 🦋 Release preview

on:
  pull_request_target:

permissions: {}

jobs:
  pr-status:
    name: Changeset status
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      comment-body: ${{ steps.pr-status.outputs.comment-body }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - id: pr-status
        uses: changesets/action/pr-status@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: pr-status
    permissions:
      pull-requests: write
    steps:
      - uses: changesets/action/pr-comment@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          body: ${{ needs.pr-status.outputs.comment-body }}
