name: 🦋 Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  cli-release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --dir cli build

      - name: Verify CLI build
        run: ls cli/dist/commands/

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: pnpm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rename CLI release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name == "@loopress/cli") | .version')
          if [ -n "$VERSION" ]; then
            gh release edit "@loopress/cli@${VERSION}" --title "CLI ${VERSION}"
          fi

  plugin-release:
    name: WordPress Plugin Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get plugin version
        id: version
        run: echo "version=$(jq -r '.version' wordpress-plugin/package.json)" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="wordpress-plugin@${{ steps.version.outputs.version }}"
          if gh release view "$TAG" &>/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        if: steps.check.outputs.exists == 'false'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'false'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile --filter @loopress/wordpress-plugin...

      # Re-derives loopress.php's Version header and both readme.txt's Stable tag from
      # package.json right before packaging, instead of trusting they're already in sync.
      # `changeset version` bumps package.json directly and never runs its "version" script;
      # the only thing that normally does is the separate wordpress-plugin-version job in
      # release-preview.yml, which reacts asynchronously to the Version Packages PR. If that
      # PR gets merged before that job's follow-up commit lands, main carries a bumped
      # package.json with stale version headers, and the zip would silently ship the old
      # version inside a release tagged with the new one.
      - name: Sync plugin version header
        if: steps.check.outputs.exists == 'false'
        working-directory: wordpress-plugin
        run: pnpm run version

      # Builds both editions: loopress-light.zip (Loopress Light, wordpress.org) and
      # loopress-full.zip (Loopress Full, loopress.dev). Both ship in the same GitHub release.
      - name: Build and zip both plugin editions
        if: steps.check.outputs.exists == 'false'
        working-directory: wordpress-plugin
        run: pnpm run pack

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "wordpress-plugin@${VERSION}" \
            wordpress-plugin/loopress-light.zip \
            wordpress-plugin/loopress-full.zip \
            --title "WordPress Plugin v${VERSION}"
