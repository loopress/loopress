deptrac:
  paths:
    - ./src
  layers:
    # The one interface both Light and Plus legitimately depend on. Matched by exact
    # FQCN, not the whole Contract namespace: Seo's own Contract\{SeoProvider,
    # SeoRedirectProvider} live under Loopress\Seo\Contract\ (Light-only) instead.
    - name: Shared
      collectors:
        - type: classNameRegex
          value: '#^Loopress\\Contract\\Module$#'
        # Same exact-FQCN carve-out as Contract\Module above: the manage_options permission
        # check every REST controller uses (US-7), not the whole Loopress\RestApi namespace.
        - type: classNameRegex
          value: '#^Loopress\\RestApi\\RequiresManageOptionsCapability$#'
        # The DI composition root (Plugin.php builds a container from it) and the Feature
        # contract Plus features implement: both are legitimately depended on from Light
        # (Plugin.php) and Plus (each Feature.php) alike.
        - type: classNameRegex
          value: '#^Loopress\\ContainerFactory$#'
        - type: classNameRegex
          value: '#^Loopress\\Contract\\FeatureProvider$#'
        # The PSR-18 HTTP client adapter (US-18): currently only Plus (Dependencies, Update)
        # calls it, but it carries nothing feature-specific, so a future Light feature
        # needing HTTP could depend on it too.
        - type: classNameRegex
          value: '#^Loopress\\Infrastructure\\.+$#'

    - name: Light
      collectors:
        - type: classNameRegex
          value: '#^Loopress\\Acf\\.+$#'
        - type: classNameRegex
          value: '#^Loopress\\Seo\\.+$#'
        - type: classNameRegex
          value: '#^Loopress\\AdminPage\\.+$#'
        - type: classNameRegex
          value: '#^Loopress\\RestCache\\.+$#'
        - type: classNameRegex
          value: '#^Loopress\\Plugin$#'

    - name: Plus
      collectors:
        - type: classNameRegex
          value: '#^Loopress\\Dependencies\\.+$#'
        - type: classNameRegex
          value: '#^Loopress\\Update\\.+$#'
        - type: classNameRegex
          value: '#^Loopress\\Snippets\\.+$#'

  ruleset:
    # Light (Loopress Light edition) may use the shared Module contract but must never
    # import Plus-only code (Dependencies/Update/Snippets), which is stripped out of the
    # Light build by scripts/build-flavor.cjs.
    Light:
      - Shared
    # Same guarantee in the other direction: Plus code must not reach into Light internals.
    Plus:
      - Shared
